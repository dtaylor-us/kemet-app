spring:
  application:
    name: core-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:${DB_HOST_PORT:55432}/kemet}
    username: kemet
    password: ${DB_PASSWORD:kemet_local_dev}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:}

server:
  port: ${SERVER_PORT:8090}

app:
  auth0:
    audience: ${AUTH0_AUDIENCE:}
  openai:
    api-key: ${OPENAI_API_KEY:}
    # Confirmed 2026-07-20 from OpenAI's official API spec:
    # https://raw.githubusercontent.com/openai/openai-openapi/master/openapi.yaml
    # includes this exact GPT-5 nano model ID.
    model: gpt-5-nano
    max-completion-tokens: 1024
    request-timeout-seconds: 30
    max-attempts: 3
    system-prompt-path: classpath:prompts/companion-system-prompt.md
  seed:
    practice-framework-path: classpath:seed/practice-framework.json
    faculties-pattern: classpath:seed/faculties/*.json
